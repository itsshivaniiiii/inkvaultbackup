# ===========================================
# Render Blueprint for InkVault
# https://render.com/docs/blueprint-spec
# ===========================================

services:
  - type: web
    name: inkvault
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # --- App ---
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080

      # --- Database (set in Render Dashboard) ---
      - key: DATABASE_URL
        sync: false

      # --- SMTP Email (local dev fallback) ---
      - key: SmtpSettings__Server
        sync: false
      - key: SmtpSettings__Port
        sync: false
      - key: SmtpSettings__SenderEmail
        sync: false
      - key: SmtpSettings__SenderPassword
        sync: false

      # --- Brevo Email API (production on Render) ---
      - key: BREVO_API_KEY
        sync: false
      - key: Brevo__SenderEmail
        sync: false
      - key: Brevo__SenderName
        value: InkVault

      # --- Gemini AI (set in Render Dashboard) ---
      - key: Gemini__ApiKey
        sync: false
